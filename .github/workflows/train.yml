name: Train ML Model

on:
  push:
    paths:
      - 'app/api/diseases_db.json'

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Train model
      run: python train.py

    - name: Commit updated model
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add app/api/model.pkl app/api/label_encoder.pkl app/api/symptoms.pkl
        git commit -m "Update ML model after diseases_db.json change" || echo "No changes to commit"
        git push